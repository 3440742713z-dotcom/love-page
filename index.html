<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>给洪子珍</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #fff7fb, #ffe6f1, #ffd9eb);
      min-height: 100vh;
      color: #8b4d6b;
      overflow-x: hidden;
      position: relative;
    }
    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .heart {
      position: absolute;
      bottom: -30px;
      color: rgba(255, 118, 170, 0.35);
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 0; }
      10% { opacity: 1; }
      100% { transform: translateY(-120vh) scale(1.3); opacity: 0; }
    }
    .wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 26px 14px 40px;
    }
    .card {
      width: min(92vw, 430px);
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 28px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 14px 40px rgba(231, 129, 169, 0.18);
      padding: 24px 16px 22px;
    }
    .main-heart {
      width: 78px;
      height: 78px;
      margin: 6px auto 18px;
      position: relative;
      transform: rotate(-45deg);
      border-radius: 12px;
      background: linear-gradient(135deg, #ff5d9f, #ff86b9);
      animation: beat 1.2s infinite;
    }
    .main-heart::before, .main-heart::after {
      content: "";
      position: absolute;
      width: 78px;
      height: 78px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff5d9f, #ff86b9);
    }
    .main-heart::before { top: -39px; left: 0; }
    .main-heart::after { left: 39px; top: 0; }
    @keyframes beat {
      0%,100% { transform: rotate(-45deg) scale(1); }
      50% { transform: rotate(-45deg) scale(1.08); }
    }
    h1 {
      text-align: center;
      font-size: 2rem;
      color: #df4f8d;
      margin-bottom: 8px;
    }
    .sub {
      text-align: center;
      font-size: 0.98rem;
      color: #9f6782;
      margin-bottom: 18px;
    }
    .section {
      background: rgba(255,255,255,0.58);
      border: 1px solid rgba(255,255,255,0.82);
      border-radius: 22px;
      padding: 14px;
      margin-top: 14px;
    }
    .title {
      font-size: 0.95rem;
      color: #c95f93;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .text {
      line-height: 1.9;
      font-size: 1rem;
      min-height: 72px;
    }
    .typing::after {
      content: "|";
      animation: blink .8s infinite;
      margin-left: 3px;
      color: #df4f8d;
    }
    @keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }
    .gallery {
      width: 100%;
      aspect-ratio: 4/5;
      border-radius: 18px;
      overflow: hidden;
      background: #fff3f8;
    }
    .gallery img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    .gallery img.active { display: block; }
    .dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(223,79,141,0.25);
    }
    .dot.active {
      width: 22px;
      border-radius: 999px;
      background: rgba(223,79,141,0.9);
    }
    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .metric {
      background: rgba(255,248,251,0.95);
      border-radius: 18px;
      text-align: center;
      padding: 14px 10px;
      box-shadow: inset 0 0 0 1px rgba(255, 183, 210, 0.28);
    }
    .num {
      font-size: 1.6rem;
      color: #df4f8d;
      font-weight: 800;
      display: block;
      margin-bottom: 4px;
    }
    .label {
      font-size: 0.84rem;
      line-height: 1.6;
      color: #a06e87;
    }
    button {
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 13px 16px;
      margin-top: 12px;
      font-size: 0.98rem;
      cursor: pointer;
      transition: transform .18s ease;
    }
    button:active { transform: scale(0.97); }
    .primary {
      background: linear-gradient(135deg, #ff6eaa, #ff8fc0);
      color: white;
    }
    .secondary {
      background: rgba(255,255,255,0.9);
      color: #cb578d;
      border: 1px solid rgba(255, 170, 202, 0.35);
    }
    .secret {
      display: none;
      margin-top: 12px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,248,251,0.95);
      line-height: 1.9;
    }
    .status {
      margin-top: 10px;
      text-align: center;
      font-size: 0.86rem;
      color: #ae7892;
    }
    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 0.86rem;
      color: #b07d96;
    }
    audio { display: none; }
  </style>
</head>
<body>
  <div class="hearts" id="hearts"></div>

  <div class="wrap">
    <div class="card">
      <div class="main-heart"></div>
      <h1>洪子珍</h1>
      <div class="sub">把喜欢写成页面，把认真交给你。</div>

      <div class="section">
        <div class="title">写给你的话</div>
        <div class="text typing" id="typingText"></div>
        <button class="secondary" onclick="nextSentence()">再看一句想对你说的话</button>
      </div>

      <div class="section">
        <div class="title">属于我们的照片</div>
        <div class="gallery">
          <img id="img1" src="photo1.jpg" class="active" alt="照片1">
          <img id="img2" src="photo2.jpg" alt="照片2">
          <img id="img3" src="photo3.jpg" alt="照片3">
        </div>
        <div class="dots">
          <span class="dot active"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>

      <div class="section">
        <div class="title">我们的纪念日 · 10.09</div>
        <div class="metrics">
          <div class="metric">
            <span class="num" id="daysTogether">0</span>
            <div class="label">距离最近一个 10 月 9 日已过天数</div>
          </div>
          <div class="metric">
            <span class="num" id="daysToNext">0</span>
            <div class="label">距离下一个 10 月 9 日还有天数</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="title">《告白气球》 · 周杰伦</div>
        <div class="text" style="min-height:auto;">有些喜欢不需要太多铺垫，旋律一响，心意就自己站出来了。</div>
        <button class="primary" onclick="toggleMusic()">播放 / 暂停 BGM</button>
        <div class="status" id="musicStatus">轻轻一点，浪漫开始播放。</div>
        <audio id="bgm" loop preload="auto" autoplay>
          <source src="gaobaiqiqiu.mp3" type="audio/mpeg">
        </audio>
      </div>

      <div class="section">
        <div class="title">点开看看</div>
        <button class="primary" onclick="showLove()">查看隐藏告白</button>
        <div class="secret" id="loveBox"></div>
      </div>

      <div class="footer">今天的浪漫，是认真写给你的。</div>
    </div>
  </div>

  <script>
    const texts = [
      "在有些普通的日子里，因为你，风都变得很温柔。",
      "我想把喜欢写成代码，把心动做成网页，然后郑重地送给你。",
      "洪子珍，你是让我生活变亮的人。",
      "和你有关的事情，我都想认真一点，久一点，再久一点。"
    ];

    const secretMessages = [
      "我想和你一起把平凡的日子，过成值得收藏的纪念。",
      "喜欢你这件事，不是一时兴起，是我反复确认后的坚定结论。",
      "洪子珍，我不是想短暂地惊艳你，我是想长久地陪着你。"
    ];

    let textIndex = 0;
    let typing = false;
    const typingText = document.getElementById('typingText');
    const loveBox = document.getElementById('loveBox');
    const audio = document.getElementById('bgm');
    const musicStatus = document.getElementById('musicStatus');

    function typeWriter(text) {
      typing = true;
      typingText.textContent = '';
      let i = 0;
      const timer = setInterval(() => {
        typingText.textContent += text.charAt(i);
        i++;
        if (i >= text.length) {
          clearInterval(timer);
          typing = false;
        }
      }, 60);
    }

    function nextSentence() {
      if (typing) return;
      textIndex = (textIndex + 1) % texts.length;
      typeWriter(texts[textIndex]);
    }

    function showLove() {
      const msg = secretMessages[Math.floor(Math.random() * secretMessages.length)];
      loveBox.style.display = 'block';
      loveBox.innerHTML = '<strong>给洪子珍：</strong><br>' + msg + '<br><br><strong>我喜欢你，很喜欢你。</strong>';
    }

    function setAnniversary() {
      const now = new Date();
      const year = now.getFullYear();
      const thisAnniv = new Date(year, 9, 9);
      let lastAnniv, nextAnniv;
      if (now >= thisAnniv) {
        lastAnniv = thisAnniv;
        nextAnniv = new Date(year + 1, 9, 9);
      } else {
        lastAnniv = new Date(year - 1, 9, 9);
        nextAnniv = thisAnniv;
      }
      const day = 24 * 60 * 60 * 1000;
      document.getElementById('daysTogether').textContent = Math.floor((now - lastAnniv) / day);
      document.getElementById('daysToNext').textContent = Math.ceil((nextAnniv - now) / day);
    }

    function toggleMusic() {
      if (audio.paused) {
        audio.play().then(() => {
          musicStatus.textContent = '《告白气球》正在播放';
        }).catch(() => {
          musicStatus.textContent = '点一下，旋律就会响起';
        });
      } else {
        audio.pause();
        musicStatus.textContent = '音乐暂停了，但喜欢没有';
      }
    }

    document.addEventListener('click', () => {
      if (audio.paused) {
        audio.play().then(() => {
          musicStatus.textContent = '《告白气球》正在播放';
        }).catch(() => {});
      }
    }, { once: true });

    function initGallery() {
      const imgs = [document.getElementById('img1'), document.getElementById('img2'), document.getElementById('img3')];
      const dots = document.querySelectorAll('.dot');
      let idx = 0;
      setInterval(() => {
        imgs[idx].classList.remove('active');
        dots[idx].classList.remove('active');
        idx = (idx + 1) % imgs.length;
        imgs[idx].classList.add('active');
        dots[idx].classList.add('active');
      }, 2500);
    }

    function createHearts() {
      const box = document.getElementById('hearts');
      for (let i = 0; i < 20; i++) {
        const h = document.createElement('div');
        h.className = 'heart';
        h.innerHTML = ['❤','♥','♡','💗'][Math.floor(Math.random() * 4)];
        h.style.left = Math.random() * 100 + 'vw';
        h.style.fontSize = (14 + Math.random() * 16) + 'px';
        h.style.animationDuration = (6 + Math.random() * 7) + 's';
        h.style.animationDelay = (Math.random() * 6) + 's';
        box.appendChild(h);
      }
    }

    createHearts();
    setAnniversary();
    typeWriter(texts[0]);
    initGallery();
  </script>
</body>
</html>
